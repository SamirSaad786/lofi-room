<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lofi Room</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; background:#0a0614; overflow:hidden; font-family:'Space Mono',monospace; }
#scene { position:relative; width:100vw; height:100vh; overflow:hidden; }
#scene::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:50;
  opacity:0.22; mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.09'/%3E%3C/svg%3E");
}
#bg {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:center; z-index:1;
  transition:filter 2s cubic-bezier(0.4,0,0.2,1);
  filter:brightness(0.88) saturate(1.05);
}
#color-wash {
  position:absolute; inset:0; z-index:2; pointer-events:none;
  opacity:0; transition:background 2s ease, opacity 2s ease;
  mix-blend-mode:color;
}
#color-wash.active { opacity:0.28; }
 
#viz-canvas {
  position:absolute; z-index:8; pointer-events:none;
  opacity:0; transition:opacity 1s ease;
}
#viz-canvas.active { opacity:1; }
 
/* HUD */
#hud {
  position:absolute; top:22px; left:50%; transform:translateX(-50%);
  z-index:40; display:flex; flex-direction:column; align-items:center; gap:5px;
  pointer-events:none; opacity:0; transition:opacity 0.8s ease;
}
#hud.visible { opacity:1; }
#station-name {
  font-family:'Caveat',cursive; font-size:clamp(1.5rem,3.2vw,2.6rem);
  font-weight:700; color:#fff; letter-spacing:0.04em; white-space:nowrap;
  text-shadow:0 0 22px var(--glow,rgba(255,255,255,0.4)),0 2px 12px rgba(0,0,0,1);
  transition:text-shadow 1.5s ease;
}
#station-vibe {
  font-size:clamp(0.45rem,0.78vw,0.63rem);
  color:rgba(255,255,255,0.45); letter-spacing:0.22em; text-transform:uppercase;
}
.eq { display:flex; gap:3px; align-items:flex-end; height:16px; margin-top:3px; }
.eq span {
  display:inline-block; width:3px; border-radius:2px; background:var(--accent,#4ecdc4);
  animation:eq 0.55s ease-in-out infinite alternate; transition:background 1.2s ease;
}
.eq span:nth-child(1){height:5px; animation-delay:0s;}
.eq span:nth-child(2){height:11px; animation-delay:0.12s;}
.eq span:nth-child(3){height:16px; animation-delay:0.24s;}
.eq span:nth-child(4){height:8px; animation-delay:0.18s;}
.eq span:nth-child(5){height:13px; animation-delay:0.07s;}
@keyframes eq { from{transform:scaleY(0.2);} to{transform:scaleY(1);} }
 
/* Dock */
#dock {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  z-index:40; display:flex; align-items:center;
  background:rgba(6,3,16,0.78); border:1px solid rgba(255,255,255,0.08);
  border-radius:44px; padding:10px 18px;
  backdrop-filter:blur(16px); box-shadow:0 6px 40px rgba(0,0,0,0.55);
}
.stn {
  display:flex; flex-direction:column; align-items:center; gap:7px;
  padding:8px 14px; cursor:pointer; border-radius:30px; border:none; background:transparent;
  transition:background 0.25s ease,transform 0.22s ease;
}
.stn:hover { background:rgba(255,255,255,0.06); transform:translateY(-2px); }
.stn.active { background:rgba(255,255,255,0.09); }
.stn .dot {
  width:11px; height:11px; border-radius:50%; background:rgba(255,255,255,0.2);
  transition:background 0.5s ease,box-shadow 0.5s ease,transform 0.4s ease;
}
.stn.active .dot { background:var(--btn-color); box-shadow:0 0 10px var(--btn-color),0 0 22px var(--btn-color); transform:scale(1.35); }
.stn:not(.active):hover .dot { background:rgba(255,255,255,0.45); }
.stn .lbl {
  font-family:'Caveat',cursive; font-size:clamp(0.72rem,1.1vw,0.9rem); font-weight:600;
  color:rgba(255,255,255,0.3); white-space:nowrap; letter-spacing:0.02em; transition:color 0.4s ease;
}
.stn.active .lbl, .stn:hover .lbl { color:rgba(255,255,255,0.88); }
.dvdr { width:1px; height:30px; background:rgba(255,255,255,0.07); flex-shrink:0; }
 
/* Volume */
#vol-section { display:flex; align-items:center; gap:8px; padding:0 6px 0 14px; }
.vol-icon { font-size:0.85rem; opacity:0.5; user-select:none; }
#vol-slider {
  -webkit-appearance:none; appearance:none;
  width:clamp(80px,9vw,130px); height:4px; border-radius:4px;
  background:linear-gradient(to right,var(--accent,#4ecdc4) 0%,var(--accent,#4ecdc4) 80%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.15) 100%);
  outline:none; cursor:pointer; transition:background 0.4s ease;
}
#vol-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
  background:var(--accent,#4ecdc4); box-shadow:0 0 8px var(--accent,#4ecdc4);
  cursor:pointer; transition:background 1s,box-shadow 1s,transform 0.2s;
}
#vol-slider::-webkit-slider-thumb:hover { transform:scale(1.3); }
#vol-slider::-moz-range-thumb {
  width:15px; height:15px; border-radius:50%; border:none;
  background:var(--accent,#4ecdc4); cursor:pointer;
}
#vol-pct { font-size:0.55rem; color:rgba(255,255,255,0.35); min-width:26px; text-align:right; }
 
/* Ko-fi button */
#kofi-btn {
  display:flex; align-items:center; gap:6px;
  margin-left:10px; padding:7px 13px;
  background:rgba(255,94,91,0.12);
  border:1px solid rgba(255,94,91,0.28);
  border-radius:30px; cursor:pointer;
  text-decoration:none;
  transition:background 0.25s ease, border-color 0.25s ease, transform 0.22s ease;
  flex-shrink:0;
}
#kofi-btn:hover {
  background:rgba(255,94,91,0.22);
  border-color:rgba(255,94,91,0.55);
  transform:translateY(-2px);
}
#kofi-btn svg {
  width:16px; height:16px; flex-shrink:0;
}
#kofi-btn span {
  font-family:'Caveat',cursive; font-size:0.85rem; font-weight:600;
  color:rgba(255,180,178,0.85); white-space:nowrap; letter-spacing:0.02em;
  transition:color 0.25s ease;
}
#kofi-btn:hover span { color:rgba(255,200,198,1); }
 
/* Loading indicator */
#loading {
  position:absolute; bottom:88px; left:50%; transform:translateX(-50%);
  z-index:60; background:rgba(6,3,16,0.85); border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.6); font-size:0.58rem; letter-spacing:0.15em;
  padding:7px 18px; border-radius:20px; backdrop-filter:blur(8px);
  opacity:0; transition:opacity 0.3s; pointer-events:none; text-transform:uppercase;
}
#loading.visible { opacity:1; }
 
.ripple {
  position:fixed; border-radius:50%; width:48px; height:48px;
  margin-left:-24px; margin-top:-24px; pointer-events:none;
  animation:ripout 0.7s ease-out forwards; z-index:999;
}
@keyframes ripout { to{transform:scale(5);opacity:0;} }
 
/* Intro */
#intro {
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 48% 56%,rgba(20,9,42,0.97) 0%,rgba(4,2,10,0.99) 100%);
  z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  transition:opacity 1.4s ease;
}
#intro.fade { opacity:0; pointer-events:none; }
#intro h1 {
  font-family:'Caveat',cursive; font-size:clamp(3rem,8.5vw,6rem); font-weight:700; color:#fff;
  text-shadow:0 0 70px rgba(78,205,196,0.45),0 0 140px rgba(78,205,196,0.12);
}
#intro .sub {
  font-size:clamp(0.5rem,0.9vw,0.68rem); color:rgba(255,255,255,0.3);
  letter-spacing:0.3em; text-transform:uppercase; text-align:center; line-height:2.5; margin-top:6px;
}
#enter-btn {
  margin-top:24px; background:transparent; border:1px solid rgba(78,205,196,0.38); color:#4ecdc4;
  font-family:'Space Mono',monospace; font-size:0.68rem; letter-spacing:0.28em;
  padding:14px 42px; cursor:pointer; border-radius:3px; transition:all 0.35s; text-transform:uppercase;
}
#enter-btn:hover {
  background:rgba(78,205,196,0.07); border-color:rgba(78,205,196,0.75);
  box-shadow:0 0 36px rgba(78,205,196,0.16); transform:translateY(-2px);
}
</style>
</head>

class CrossfadePlayer {
  constructor(ctx, masterGain) {
    this.ctx = ctx;
    this.masterGain = masterGain;
    this.buffers = [null, null];
    this.sources = [null, null];
    this.gains   = [null, null];
    this.filters = [null, null];
    this.durations = [0, 0];
    this.fadeTimes = [25, 25];
    this.playing = false;
    this.activeIdx = 0;
    this.fadeTimer = null;
    this.startTimes = [0, 0];
    this._stopped = false;
  }
 
  _calcFade(dur) {
    return Math.min(25, Math.max(8, dur * 0.12));
  }
 
  setBuffers(buf0, buf1, dur0, dur1) {
    this.buffers   = [buf0, buf1];
    this.durations = [dur0, dur1];
    this.fadeTimes = [this._calcFade(dur0), this._calcFade(dur1)];
  }
 
  _eqPower(t) { return Math.cos(t * Math.PI * 0.5); }
 
  _createSource(idx) {
    const src = this.ctx.createBufferSource();
    src.buffer = this.buffers[idx];
    const filt = this.ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 20000;
    const gain = this.ctx.createGain();
    gain.gain.value = 0;
    src.connect(filt);
    filt.connect(gain);
    gain.connect(this.masterGain);
    this.sources[idx] = src;
    this.gains[idx]   = gain;
    this.filters[idx] = filt;
    return src;
  }
 
  start(startIdx = 0) {
    if (this._stopped) return;
    this._stopped = false;
    this.activeIdx = startIdx;
    this._playTrack(startIdx, 1.0);
    this._scheduleCrossfade(startIdx);
    this.playing = true;
  }
 
  _playTrack(idx, targetVol) {
    const src  = this._createSource(idx);
    const gain = this.gains[idx];
    const now  = this.ctx.currentTime;
    gain.gain.cancelScheduledValues(now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(targetVol, now + 2);
    src.start(now);
    this.startTimes[idx] = now;
  }
 
  _scheduleCrossfade(outIdx) {
    if (this._stopped) return;
    const dur      = this.durations[outIdx];
    const fadeTime = this.fadeTimes[outIdx];
    const inIdx    = 1 - outIdx;
    const delay = dur - fadeTime;
    this.fadeTimer = setTimeout(() => {
      if (this._stopped) return;
      this._crossfade(outIdx, inIdx, fadeTime);
    }, delay * 1000);
  }
 
  _crossfade(outIdx, inIdx, fadeTime) {
    if (this._stopped) return;
    const ctx  = this.ctx;
    const now  = ctx.currentTime;
    this._playTrack(inIdx, 0);
    const outGain  = this.gains[outIdx];
    const inGain   = this.gains[inIdx];
    const outFilt  = this.filters[outIdx];
    const steps = 60;
    for (let i = 0; i <= steps; i++) {
      const t   = i / steps;
      const time = now + (t * fadeTime);
      outGain.gain.linearRampToValueAtTime(this._eqPower(t), time);
      inGain.gain.linearRampToValueAtTime(Math.sin(t * Math.PI * 0.5), time);
      outFilt.frequency.linearRampToValueAtTime(20000 - (19600 * t), time);
    }
    setTimeout(() => {
      if (this._stopped) return;
      try {
        this.sources[outIdx].stop();
        this.sources[outIdx].disconnect();
      } catch(e) {}
      this.activeIdx = inIdx;
      this._scheduleCrossfade(inIdx);
    }, fadeTime * 1000 + 100);
  }
 
  stop() {
    this._stopped = true;
    this.playing  = false;
    clearTimeout(this.fadeTimer);
    [0, 1].forEach(i => {
      try {
        if (this.gains[i]) {
          const now = this.ctx.currentTime;
          this.gains[i].gain.cancelScheduledValues(now);
          this.gains[i].gain.linearRampToValueAtTime(0, now + 1.5);
        }
        setTimeout(() => {
          try { this.sources[i] && this.sources[i].stop(); } catch(e){}
          try { this.sources[i] && this.sources[i].disconnect(); } catch(e){}
        }, 1600);
      } catch(e) {}
    });
  }
}
 
// ─────────────────────────────────────────────
//  AUDIO CONTEXT + MASTER VOLUME
// ─────────────────────────────────────────────
let audioCtx    = null;
let masterGain  = null;
let currentPlayer = null;
let entered = false;
const bufferCache = {};
 
function ensureContext() {
  if (audioCtx) return;
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(volSlider.value) / 100;
  masterGain.connect(audioCtx.destination);
}
 
async function loadBuffer(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Cannot load ${url}`);
  const arrayBuf = await resp.arrayBuffer();
  return audioCtx.decodeAudioData(arrayBuf);
}
 
async function playStation(key, x, y) {
  if (!entered) return;
  const s = STATIONS[key];
  ripple(x, y, s.glow);
  document.getElementById('station-name').textContent  = s.name;
  document.getElementById('station-vibe').textContent  = s.vibe;
  document.getElementById('station-name').style.textShadow =
    `0 0 26px ${s.glow},0 2px 12px rgba(0,0,0,1)`;
  document.getElementById('hud').classList.add('visible');
  document.documentElement.style.setProperty('--accent', s.accent);
  document.documentElement.style.setProperty('--glow',   s.glow);
  document.querySelectorAll('.eq span').forEach(sp => sp.style.background = s.accent);
  updateVolTrack(parseInt(volSlider.value));
  document.getElementById('bg').style.filter = s.bgFilter;
  const wash = document.getElementById('color-wash');
  wash.style.background = s.wash; wash.classList.add('active');
  targetVizR = s.vizR; targetVizG = s.vizG; targetVizB = s.vizB;
  vizPlaying = true; canvas.classList.add('active');
  document.querySelectorAll('.stn').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key));
 
  if (currentPlayer) { currentPlayer.stop(); currentPlayer = null; }
 
  const loading = document.getElementById('loading');
  if (!bufferCache[key]) { loading.classList.add('visible'); }
 
  try {
    ensureContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    if (!bufferCache[key]) {
      const [b0, b1] = await Promise.all([
        loadBuffer(s.tracks[0]),
        loadBuffer(s.tracks[1])
      ]);
      bufferCache[key] = [b0, b1];
    }
    loading.classList.remove('visible');
    const player = new CrossfadePlayer(audioCtx, masterGain);
    player.setBuffers(bufferCache[key][0], bufferCache[key][1], s.durations[0], s.durations[1]);
    player.start(0);
    currentPlayer = player;
  } catch(err) {
    loading.classList.remove('visible');
    console.warn('Audio error:', err.message);
  }
}
 
// ─────────────────────────────────────────────
//  VOLUME CONTROL
// ─────────────────────────────────────────────
const volSlider = document.getElementById('vol-slider');
const volPct    = document.getElementById('vol-pct');
 
function updateVolTrack(v) {
  const p = v + '%';
  volSlider.style.background =
    `linear-gradient(to right,var(--accent,#4ecdc4) 0%,var(--accent,#4ecdc4) ${p},rgba(255,255,255,0.15) ${p},rgba(255,255,255,0.15) 100%)`;
  volPct.textContent = v + '%';
  if (masterGain) masterGain.gain.value = v / 100;
}
volSlider.addEventListener('input', () => updateVolTrack(parseInt(volSlider.value)));
updateVolTrack(80);
 
// ─────────────────────────────────────────────
//  VISUALIZER
// ─────────────────────────────────────────────
const canvas = document.getElementById('viz-canvas');
const ctx    = canvas.getContext('2d');
const BAR_COUNT = 52;
let bars    = new Float32Array(BAR_COUNT).fill(0);
let targets = new Float32Array(BAR_COUNT).fill(0);
let phases  = Array.from({length:BAR_COUNT}, ()=>Math.random()*Math.PI*2);
let speeds  = Array.from({length:BAR_COUNT}, ()=>0.007+Math.random()*0.016);
let vizPlaying = false;
let currentVizR=78,currentVizG=205,currentVizB=196;
let targetVizR=78, targetVizG=205, targetVizB=196;
 
function updateTargets() {
  for (let i=0;i<BAR_COUNT;i++) {
    phases[i]+=speeds[i];
    const base = 0.42;
    const w1=Math.sin(phases[i])*0.5+0.5;
    const w2=Math.sin(phases[i]*1.7+1.3)*0.5+0.5;
    const w3=Math.sin(phases[i]*0.4+i*0.31)*0.5+0.5;
    const wave = Math.sin(phases[i]*0.5 - i*0.18)*0.18;
    const c = base + wave + (w1*0.12 + w2*0.10 + w3*0.08);
    const spike = Math.random()<0.012 ? Math.random()*0.28 : 0;
    targets[i]=Math.min(1,Math.max(0.06, c + spike));
  }
}
 
function drawViz() {
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if (!vizPlaying) { requestAnimationFrame(drawViz); return; }
  updateTargets();
  for (let i=0;i<BAR_COUNT;i++) bars[i]+=(targets[i]-bars[i])*0.11;
  currentVizR+=(targetVizR-currentVizR)*0.035;
  currentVizG+=(targetVizG-currentVizG)*0.035;
  currentVizB+=(targetVizB-currentVizB)*0.035;
  const r=Math.round(currentVizR),g=Math.round(currentVizG),b=Math.round(currentVizB);
  const gap=W*0.008,barW=(W-gap*(BAR_COUNT+1))/BAR_COUNT,maxH=H*0.88;
  for (let i=0;i<BAR_COUNT;i++) {
    const x=gap+i*(barW+gap),bH=bars[i]*maxH,y=H-bH;
    const grd=ctx.createLinearGradient(0,y,0,H);
    grd.addColorStop(0,`rgba(${r},${g},${b},0.80)`);
    grd.addColorStop(0.5,`rgba(${r},${g},${b},0.35)`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0.04)`);
    ctx.fillStyle=grd; ctx.beginPath(); ctx.roundRect(x,y,barW,bH,[barW*0.4,barW*0.4,0,0]); ctx.fill();
    ctx.fillStyle=`rgba(${r},${g},${b},0.95)`;
    ctx.beginPath(); ctx.ellipse(x+barW/2,y+1,barW*0.48,barW*0.28,0,0,Math.PI*2); ctx.fill();
  }
  ctx.save(); ctx.globalAlpha=0.09; ctx.scale(1,-0.18); ctx.translate(0,-H*5.1);
  for (let i=0;i<BAR_COUNT;i++) {
    const x=gap+i*(barW+gap),bH=bars[i]*maxH,y=H-bH;
    const grd2=ctx.createLinearGradient(0,y,0,H);
    grd2.addColorStop(0,`rgba(${r},${g},${b},0.3)`);
    grd2.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=grd2; ctx.beginPath(); ctx.roundRect(x,y,barW,bH,[0,0,barW*0.4,barW*0.4]); ctx.fill();
  }
  ctx.restore();
  requestAnimationFrame(drawViz);
}
 
function positionCanvas() {
  const dock = document.getElementById('dock');
  const dr   = dock.getBoundingClientRect();
  const VIZ_HEIGHT = 56;
  canvas.style.left   = dr.left   + 'px';
  canvas.style.width  = dr.width  + 'px';
  canvas.style.top    = (dr.top - VIZ_HEIGHT) + 'px';
  canvas.style.height = VIZ_HEIGHT + 'px';
  canvas.width        = dr.width;
  canvas.height       = VIZ_HEIGHT;
}
window.addEventListener('resize', positionCanvas);
setTimeout(positionCanvas, 100);
requestAnimationFrame(drawViz);
 
// ─────────────────────────────────────────────
//  RIPPLE
// ─────────────────────────────────────────────
function ripple(x, y, c) {
  const el = document.createElement('div'); el.className='ripple';
  el.style.cssText = `left:${x}px;top:${y}px;background:${c}`;
  document.body.appendChild(el); setTimeout(()=>el.remove(), 750);
}
 
// ─────────────────────────────────────────────
//  STATION BUTTONS
// ─────────────────────────────────────────────
document.querySelectorAll('.stn').forEach(b =>
  b.addEventListener('click', e => {
    if (!entered) return;
    playStation(b.dataset.key, e.clientX, e.clientY);
  })
);
 
// ─────────────────────────────────────────────
//  ENTER
// ─────────────────────────────────────────────
document.getElementById('enter-btn').addEventListener('click', () => {
  entered = true;
  positionCanvas();
  document.getElementById('intro').classList.add('fade');
  setTimeout(() => document.getElementById('intro').style.display='none', 1500);
  setTimeout(() => playStation('fire', window.innerWidth/2, window.innerHeight/2), 700);
});
</script>
